name: Actualizacion Automatica Diaria
 
on:
  schedule:
    # Intento 1: 4:00 AM Lima = 9:00 AM UTC  ← Menos congestionado que 8 UTC
    - cron: '0 9 * * *'
    # Intento 2: 5:00 AM Lima = 10:00 AM UTC ← Respaldo por si acaso
    - cron: '0 10 * * *'
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    # ✅ Fuerza zona horaria Lima en todo el job
    env:
      TZ: America/Lima
 
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3
 
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
 
      - name: Instalar librerias
        run: pip install pandas requests pytz
 
      - name: Mostrar hora actual Lima (para debug)
        run: |
          echo "Hora UTC:  $(date -u)"
          echo "Hora Lima: $(TZ='America/Lima' date)"
 
      - name: Ejecutar script Los Brujos
        run: python actualizar_datos.py
 
      - name: Ejecutar script Yaurilla
        run: python actualizar_yaurilla.py
 
      - name: Guardar cambios en ambos CSV
        run: |
          git config --global user.name 'Robot Meteorologico'
          git config --global user.email 'bot@fundo.com'
          git add datos_actualizados.csv datos_yaurilla.csv
          git diff --staged --quiet || git commit -m "Robot: Data actualizada $(TZ='America/Lima' date +'%Y-%m-%d %H:%M') Lima"
          git push
